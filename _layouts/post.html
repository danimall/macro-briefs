---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
  <p><a href="{{ '/' | relative_url }}">&larr; Back to Archive</a></p>

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%B %-d, %Y at %-I:%M %p" }}
      </time>
    </p>
  </header>

  {% if page.audio_url %}
  <div class="post-audio">
    <details open>
      <summary>Audio Overview</summary>
      <audio controls preload="none" style="width:100%; margin-top:8px;">
        <source src="{{ page.audio_url | relative_url }}" type="audio/mp4">
        Your browser does not support the audio element.
      </audio>
    </details>
  </div>
  {% endif %}

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>
</article>
